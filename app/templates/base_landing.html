<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block page_title %}MediScan AI{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/landing.css">
</head>
<body class="landing-body">

<!-- ── TOP NAV ── -->
<nav class="land-nav">
    <a href="/landing" class="land-logo">
        <div class="land-logo-icon">
            <svg width="18" height="18" viewBox="0 0 22 22" fill="none">
                <path d="M11 2v18M2 11h18M6 6l10 10M16 6L6 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
        </div>
        <span class="land-logo-name">MediScan</span>
        <span class="land-logo-tag">AI</span>
    </a>

    <div class="land-nav-links">
        <a href="/m1" class="land-nav-link">Report Extractor</a>
        <a href="/module2" class="land-nav-link">RAG Knowledge</a>
        <a href="/module3" class="land-nav-link">AI Agents</a>
        <a href="/dashboard" class="land-nav-link">Dashboard</a>
    </div>

    <div class="land-nav-right">
        <button class="land-theme-btn" onclick="toggleTheme()" id="themeToggle" title="Toggle theme">
            <svg class="icon-moon" width="16" height="16" viewBox="0 0 16 16" fill="none">
                <path d="M13.5 10A6 6 0 016 2.5a.5.5 0 00-.6.6A6 6 0 1013.4 10.6a.5.5 0 00-.6-.6H13.5z" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            <svg class="icon-sun" width="16" height="16" viewBox="0 0 16 16" fill="none">
                <circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.3"/>
                <path d="M8 1v1.5M8 13.5V15M1 8h1.5M13.5 8H15M3.22 3.22l1.06 1.06M11.72 11.72l1.06 1.06M11.72 4.28l-1.06 1.06M4.28 11.72l-1.06 1.06" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            <span id="themeLabel">Light</span>
        </button>
        <a href="/m1" class="land-cta-nav">Upload Report</a>
    </div>
</nav>

<!-- ── PAGE CONTENT ── -->
<main class="land-main">
    {% block content %}{% endblock %}
</main>

<!-- ── FOOTER ── -->
<footer class="land-footer">
    <div class="land-footer-inner">
        <div class="land-footer-brand">
            <div class="land-logo-icon" style="width:32px;height:32px;">
                <svg width="16" height="16" viewBox="0 0 22 22" fill="none">
                    <path d="M11 2v18M2 11h18M6 6l10 10M16 6L6 16" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </div>
            <div>
                <div class="land-logo-name" style="font-size:15px;">MediScan AI</div>
                <div style="font-size:11px;color:var(--text-dim);margin-top:2px;">Your Smart Medical Companion · v2.0</div>
            </div>
        </div>
        <div class="land-footer-links">
            <a href="/">Report Extractor</a>
            <a href="/module2">RAG Knowledge</a>
            <a href="/module3">AI Agents</a>
            <a href="/dashboard">Dashboard</a>
        </div>
        <div class="land-footer-note">
            For informational use only. Not a substitute for professional medical advice.
        </div>
    </div>
</footer>

<script src="/static/js/main.js"></script>
<script src="/static/js/landing.js"></script>
</body>
</html>
